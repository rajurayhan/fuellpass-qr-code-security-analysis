<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <!-- QR-like decorative pattern top right -->
    <pattern id="qr" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="rgba(200,169,110,0.12)"/>
      <rect x="4" y="4" width="4" height="4" fill="rgba(200,169,110,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- QR decorative block top right -->
  <rect x="860" y="-20" width="380" height="380" fill="url(#qr)" rx="4"/>
  <rect x="860" y="-20" width="380" height="380" fill="rgba(13,13,13,0.4)" rx="4"/>

  <!-- QR corner squares (decorative) -->
  <rect x="900" y="20" width="80" height="80" fill="none" stroke="rgba(200,169,110,0.3)" stroke-width="3" rx="4"/>
  <rect x="912" y="32" width="56" height="56" fill="rgba(200,169,110,0.08)" rx="2"/>
  <rect x="924" y="44" width="32" height="32" fill="rgba(200,169,110,0.2)" rx="2"/>

  <rect x="1060" y="20" width="80" height="80" fill="none" stroke="rgba(200,169,110,0.3)" stroke-width="3" rx="4"/>
  <rect x="1072" y="32" width="56" height="56" fill="rgba(200,169,110,0.08)" rx="2"/>
  <rect x="1084" y="44" width="32" height="32" fill="rgba(200,169,110,0.2)" rx="2"/>

  <rect x="900" y="180" width="80" height="80" fill="none" stroke="rgba(200,169,110,0.3)" stroke-width="3" rx="4"/>
  <rect x="912" y="192" width="56" height="56" fill="rgba(200,169,110,0.08)" rx="2"/>
  <rect x="924" y="204" width="32" height="32" fill="rgba(200,169,110,0.2)" rx="2"/>

  <!-- QR dots scattered -->
  <rect x="1000" y="120" width="16" height="16" fill="rgba(200,169,110,0.25)" rx="2"/>
  <rect x="1024" y="120" width="16" height="16" fill="rgba(200,169,110,0.15)" rx="2"/>
  <rect x="1000" y="144" width="16" height="16" fill="rgba(200,169,110,0.1)" rx="2"/>
  <rect x="1048" y="144" width="16" height="16" fill="rgba(200,169,110,0.25)" rx="2"/>
  <rect x="1024" y="168" width="16" height="16" fill="rgba(200,169,110,0.2)" rx="2"/>
  <rect x="1000" y="168" width="16" height="16" fill="rgba(200,169,110,0.08)" rx="2"/>
  <rect x="1072" y="120" width="16" height="16" fill="rgba(200,169,110,0.18)" rx="2"/>
  <rect x="1096" y="144" width="16" height="16" fill="rgba(200,169,110,0.12)" rx="2"/>
  <rect x="1048" y="200" width="16" height="16" fill="rgba(200,169,110,0.22)" rx="2"/>
  <rect x="1096" y="200" width="16" height="16" fill="rgba(200,169,110,0.1)" rx="2"/>
  <rect x="1072" y="220" width="16" height="16" fill="rgba(200,169,110,0.16)" rx="2"/>

  <!-- Left accent line -->
  <rect x="80" y="100" width="3" height="280" fill="#c8a96e" rx="2"/>

  <!-- Tag label -->
  <text x="104" y="136" font-family="'Courier New', monospace" font-size="13" fill="#c8a96e" letter-spacing="3" font-weight="500">SECURITY ANALYSIS — BANGLADESH</text>

  <!-- Main title -->
  <text x="104" y="230" font-family="Georgia, serif" font-size="62" fill="#e8e4dc" font-weight="400" letter-spacing="-1">QR Code Security</text>
  <text x="104" y="305" font-family="Georgia, serif" font-size="62" fill="#e8e4dc" font-weight="400" letter-spacing="-1">in <tspan fill="#c8a96e" font-style="italic">Fuellpass</tspan></text>

  <!-- Subtitle -->
  <text x="104" y="365" font-family="Arial, sans-serif" font-size="20" fill="#8a8680" font-weight="400">Vulnerabilities, replay attacks, and a layered</text>
  <text x="104" y="392" font-family="Arial, sans-serif" font-size="20" fill="#8a8680" font-weight="400">online/offline token architecture.</text>

  <!-- Divider -->
  <line x1="104" y1="440" x2="700" y2="440" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Tags row -->
  <rect x="104" y="460" width="110" height="32" rx="4" fill="rgba(212,92,92,0.12)" stroke="rgba(212,92,92,0.25)" stroke-width="1"/>
  <text x="159" y="481" font-family="'Courier New', monospace" font-size="12" fill="#d45c5c" text-anchor="middle" letter-spacing="1">REPLAY ATTACK</text>

  <rect x="226" y="460" width="100" height="32" rx="4" fill="rgba(200,148,74,0.12)" stroke="rgba(200,148,74,0.25)" stroke-width="1"/>
  <text x="276" y="481" font-family="'Courier New', monospace" font-size="12" fill="#c8944a" text-anchor="middle" letter-spacing="1">HMAC-SHA256</text>

  <rect x="338" y="460" width="90" height="32" rx="4" fill="rgba(92,158,122,0.12)" stroke="rgba(92,158,122,0.25)" stroke-width="1"/>
  <text x="383" y="481" font-family="'Courier New', monospace" font-size="12" fill="#5c9e7a" text-anchor="middle" letter-spacing="1">OFFLINE QR</text>

  <rect x="440" y="460" width="96" height="32" rx="4" fill="rgba(92,141,184,0.12)" stroke="rgba(92,141,184,0.25)" stroke-width="1"/>
  <text x="488" y="481" font-family="'Courier New', monospace" font-size="12" fill="#5c8db8" text-anchor="middle" letter-spacing="1">TOKEN DESIGN</text>

  <!-- Author -->
  <text x="104" y="570" font-family="Arial, sans-serif" font-size="16" fill="#5a5755">Raju Rayhan</text>
  <text x="104" y="592" font-family="'Courier New', monospace" font-size="12" fill="#3a3735" letter-spacing="1">rajurayhan.github.io/fuellpass-qr-code-security-analysis</text>

  <!-- Bottom right accent -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(200,169,110,0.06)"/>
  <rect x="0" y="620" width="1200" height="10" fill="rgba(200,169,110,0.04)"/>
</svg>
